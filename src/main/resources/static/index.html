<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Brindes</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h2 { color: #333; }
        #reader {
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background: white;
        }
        #resultado {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            max-width: 460px;
            display: none; /* Escondido por padrão */
        }
        .sucesso { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .erro { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<h2>Leitor de Resgate</h2>

<div id="reader"></div>

<div id="resultado"></div>

<button id="btn-reiniciar" style="display: none;" onclick="reiniciarScanner()">Ler Novo QR Code</button>

<script>
    // Configuração do leitor
    const html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: {width: 250, height: 250} },
        /* verbose= */ false
    );

    // Função executada quando a câmera acha um QR Code
    function onScanSuccess(decodedText, decodedResult) {
        // 1. Para o leitor imediatamente para não disparar 50 requisições seguidas
        html5QrcodeScanner.clear();
        mostrarMensagem("Processando...", "sucesso");

        // 2. Dispara a requisição para o seu back-end Java
        // ATENÇÃO: Ajuste a URL se o seu Spring Boot estiver em outra porta
        fetch('http://localhost:8080/qrcode/resgatar', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ token: decodedText }) // Manda o UUID lido
        })
        .then(async response => {
            if (response.ok) {
                // Status 200 OK
                mostrarMensagem("✅ Brinde Liberado com Sucesso!", "sucesso");
            } else {
                // Se deu erro (ex: 400 Bad Request), tenta ler o JSON da sua RegraNegocioException
                const data = await response.json();
                mostrarMensagem("❌ " + (data.mensagemErro || "Erro ao resgatar."), "erro");
            }
            document.getElementById('btn-reiniciar').style.display = "block";
        })
        .catch(error => {
            mostrarMensagem("❌ Erro de conexão. O servidor Java está rodando?", "erro");
            document.getElementById('btn-reiniciar').style.display = "block";
        });
    }

    function onScanFailure(error) {
        // Ignora falhas contínuas (é normal enquanto ele tenta focar na imagem)
    }

    // Inicia a câmera
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);

    // Funções auxiliares para a interface
    function mostrarMensagem(texto, classe) {
        const divResultado = document.getElementById('resultado');
        divResultado.textContent = texto;
        divResultado.className = classe;
        divResultado.style.display = "block";
    }

    function reiniciarScanner() {
        document.getElementById('resultado').style.display = "none";
        document.getElementById('btn-reiniciar').style.display = "none";
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }
</script>
</body>
</html>
