<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Brindes</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h2 { color: #333; }
        #reader {
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background: white;
        }
        #resultado {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            max-width: 460px;
            display: none; /* Escondido por padrão */
        }
        .sucesso { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .erro { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<h2>Leitor de Resgate</h2>

<div id="reader"></div>

<div id="resultado"></div>

<button id="btn-reiniciar" style="display: none;" onclick="reiniciarScanner()">Ler Novo QR Code</button>

<script>
    // 1. Variável global para armazenar a credencial em Base64 temporariamente
    let credencialAdmin = null;

    // 2. Função para exibir a janela e pedir usuário e senha
    function pedirCredenciais() {
        let usuario = prompt("🔒 Área Restrita\nDigite o usuário Admin:");
        if (!usuario) return false; // Se cancelar ou deixar vazio, retorna falso

        let senha = prompt("🔑 Digite a senha:");
        if (!senha) return false;

        // Converte "usuario:senha" para o formato Base64 exigido pelo Basic Auth
        credencialAdmin = btoa(usuario + ":" + senha);
        return true;
    }

    // Configuração do leitor
    const html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: {width: 250, height: 250} },
        /* verbose= */ false
    );

    // Função executada quando a câmera acha um QR Code
    function onScanSuccess(decodedText, decodedResult) {
        // Para o leitor imediatamente para não disparar requisições duplicadas
        html5QrcodeScanner.clear();

        // 3. Verifica se o operador já fez login. Se não, abre o prompt.
        if (!credencialAdmin) {
            let logado = pedirCredenciais();
            if (!logado) {
                mostrarMensagem("❌ Login cancelado ou inválido. Não é possível resgatar.", "erro");
                document.getElementById('btn-reiniciar').style.display = "block";
                return; // Aborta a requisição se não tiver credencial
            }
        }

        mostrarMensagem("Processando...", "sucesso");

        // 4. Dispara a requisição para o back-end com a credencial
        fetch('http://localhost:8080/qrcode/resgatar', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Basic ' + credencialAdmin // Adiciona o cabeçalho de segurança aqui
            },
            body: JSON.stringify({ token: decodedText })
        })
        .then(async response => {
            if (response.ok) {
                // Status 200 OK
                mostrarMensagem("✅ Brinde Liberado com Sucesso!", "sucesso");
            } else if (response.status === 401) {
                // Status 401: Acesso negado (senha errada no Spring Security)
                mostrarMensagem("❌ Acesso Negado: Usuário ou senha incorretos.", "erro");
                credencialAdmin = null; // Zera a credencial errada para ele tentar de novo
            } else {
                // Outros erros da regra de negócio (ex: QR code já resgatado)
                const data = await response.json();
                mostrarMensagem("❌ " + (data.mensagemErro || "Erro ao resgatar."), "erro");
            }
            document.getElementById('btn-reiniciar').style.display = "block";
        })
        .catch(error => {
            mostrarMensagem("❌ Erro de conexão. O servidor Java está rodando?", "erro");
            document.getElementById('btn-reiniciar').style.display = "block";
        });
    }

    function onScanFailure(error) {
        // Ignora falhas contínuas (é normal enquanto ele tenta focar na imagem)
    }

    // Inicia a câmera
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);

    // Funções auxiliares para a interface
    function mostrarMensagem(texto, classe) {
        const divResultado = document.getElementById('resultado');
        divResultado.textContent = texto;
        divResultado.className = classe;
        divResultado.style.display = "block";
    }

    function reiniciarScanner() {
        document.getElementById('resultado').style.display = "none";
        document.getElementById('btn-reiniciar').style.display = "none";
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }
</script>
</body>
</html>
