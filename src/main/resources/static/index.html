<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garanta seu Brinde</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <div class="form-card">
        <div class="form-header">
            <h1 class="form-title">Garanta seu Brinde</h1>
            <p class="form-description">Preencha os dados abaixo para receber seu QR Code de resgate por e-mail.</p>
        </div>

        <form id="clientForm" class="form">
            <div class="form-group">
                <label for="nome" class="label">
                    Nome Completo <span class="required">*</span>
                </label>
                <input
                        type="text"
                        id="nome"
                        name="nome"
                        class="input"
                        placeholder="Digite seu nome completo"
                        required
                >
                <span class="error-message" id="nomeError"></span>
            </div>

            <div class="form-group">
                <label for="email" class="label">
                    E-mail <span class="required">*</span>
                </label>
                <input
                        type="email"
                        id="email"
                        name="email"
                        class="input"
                        placeholder="exemplo@email.com"
                        required
                >
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100%;">
                    <span class="btn-text">Gerar meu QR Code</span>
                    <span class="spinner" id="spinner" style="display: none;"></span>
                </button>
            </div>
        </form>

        <div class="alert alert-success" id="successAlert" style="display: none;">
            <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span id="successMessage">Sucesso! Verifique seu e-mail para acessar o QR Code.</span>
        </div>

        <div class="alert alert-error" id="errorAlert" style="display: none;">
            <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="errorMessage">Erro ao gerar QR Code. Tente novamente.</span>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
